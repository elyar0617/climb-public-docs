<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Climb is a debt strategy planner that helps users choose what debt to pay next and track progress out of debt.">
  <title>Climb &ndash; Debt Strategy Planner</title>
  <style>
    :root {
      color-scheme: dark;
      --background: #07100d;
      --surface: #101a16;
      --border: #22332b;
      --text: #f3f7f5;
      --muted: #a8b5af;
      --accent: #48dc8b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 32px 20px;
      background: var(--background);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(100%, 680px);
      padding: clamp(28px, 6vw, 52px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.32);
    }

    .brand {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 7vw, 3.4rem);
      line-height: 1.08;
    }

    p {
      margin: 20px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    a {
      color: var(--accent);
      font-weight: 650;
      text-underline-offset: 4px;
    }

    a:hover,
    a:focus-visible {
      color: var(--text);
    }
  </style>
</head>
<body>
  <main>
    <p class="brand">Climb</p>
    <h1>Climb &ndash; Debt Strategy Planner</h1>
    <p>Climb helps users choose what debt to pay next, understand why it matters, and track progress out of debt.</p>
    <nav aria-label="Climb information">
      <a href="privacy-policy.html">Privacy Policy</a>
      <a href="support.html">Support</a>
      <a href="mailto:climbappsupport@gmail.com">climbappsupport@gmail.com</a>
    </nav>
  </main>
</body>
</html>
